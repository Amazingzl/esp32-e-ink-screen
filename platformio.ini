; ESP32 C3 E-Paper Project
; PlatformIO Configuration File

[platformio]
default_envs = esp32-c3
src_dir = src
lib_dir = lib
include_dir = include

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; Board settings
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; Partition table for OTA
board_build.partitions = partitions.csv

; Build flags
build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_LOOP_STACK_SIZE=24576
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    ; Uncomment when the e-paper panel is not connected.
    -D DISABLE_EPAPER=1
    ; E-Paper display driver selection (uncomment your model)
    ; Black/White displays:
    ; -D EPD_DRIVER=GxEPD2_154_D67
    ; -D EPD_DRIVER=GxEPD2_213_B74
    ; -D EPD_DRIVER=GxEPD2_290_T94
    ; -D EPD_DRIVER=GxEPD2_420
    ; 3-Color displays:
    ; -D EPD_DRIVER=GxEPD2_420c
    -D EPD_DRIVER=GxEPD2_420c_Z21
    ; -D EPD_DRIVER=GxEPD2_420c_GDEY042Z98
    ; 4-Color displays:
    ; -D EPD_DRIVER=GxEPD2_420c_GDEY0420F51

; Library dependencies
lib_deps = 
    zinggjm/GxEPD2@^1.5.3
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.14.0


; Upload settings
upload_speed = 115200
upload_protocol = esptool

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Debug settings (optional)
; debug_tool = esp-builtin
; debug_init_break = tbreak setup

; ============================================
; Test Environment - E-Paper Display Only
; ============================================
[env:test-epaper]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; 只编译 test 目录下的 test_epaper.cpp，排除 src 目录
build_src_filter = +<../test/test_epaper.cpp> -<src/*>

build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_LOOP_STACK_SIZE=24576
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D EPD_DRIVER=GxEPD2_420c_Z21

lib_deps = 
    zinggjm/GxEPD2@^1.5.3
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.14.0

upload_speed = 115200
upload_protocol = esptool
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
